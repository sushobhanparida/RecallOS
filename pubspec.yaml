name: recall_os_flutter
description: RecallOS — visual memory assistant with Linear design language
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # OCR
  google_mlkit_text_recognition: ^0.15.1

  # Object detection (smart crop)
  google_mlkit_object_detection: ^0.15.1

  # Entity extraction (URLs, money, dates, phones, flight, etc.)
  google_mlkit_entity_extraction: ^0.15.3

  # Barcode + QR scanning (UPI, WiFi, URLs, contacts)
  google_mlkit_barcode_scanning: ^0.14.2

  # Face detection (portraits)
  google_mlkit_face_detection: ^0.13.2

  # Launching UPI / URL / vcard intents
  url_launcher: ^6.3.0

  # Image cropping
  image_cropper: ^8.0.2
  image: ^4.5.4

  # Fonts
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
